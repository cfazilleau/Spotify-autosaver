services:
  autosaver:
    # Published by the docker-publish workflow on version/x.y.z tags.
    # Pin a release (e.g. :1.0.0) instead of :latest for reproducible deploys.
    image: ghcr.io/cfazilleau/spotify-autosaver:latest
    container_name: spotify-autosaver
    restart: unless-stopped

    # App credentials (client id/secret) and options like
    # AUTOSAVER_INTERVAL_SECONDS live in .env; per-account refresh tokens live
    # in the mounted users.json.
    env_file:
      - .env
    environment:
      AUTOSAVER_USERS_FILE: /app/users.json

    volumes:
      # Edit users.json on the host to add/remove accounts, then:
      #   docker compose restart
      - ./users.json:/app/users.json:ro

    command: ["run"]

    # Keep logs from growing unbounded (the poll loop logs regularly).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
