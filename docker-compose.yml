services:
  autosaver:
    # Pulls the image published to GHCR by the "Publish Docker image" workflow.
    # Authenticate first: see "Deploying from GHCR" in the README.
    # To build locally instead, uncomment `build: .` and run `docker compose up --build`.
    image: ghcr.io/cfazilleau/spotify-autosaver:latest
    # build: .
    container_name: spotify-autosaver
    restart: unless-stopped
    # App credentials (client id/secret, interval) live in .env; per-account
    # refresh tokens live in the mounted users.json.
    env_file:
      - .env
    environment:
      AUTOSAVER_USERS_FILE: /app/users.json
    volumes:
      # Edit users.json on the host to add/remove accounts; changes are picked
      # up on the next container restart.
      - ./users.json:/app/users.json:ro
    command: ["run"]
