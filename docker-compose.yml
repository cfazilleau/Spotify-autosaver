services:
  autosaver:
    # Published by the docker-publish workflow on version/x.y.z tags.
    # Pin a release (e.g. :2.1.0) instead of :latest for reproducible deploys.
    image: ghcr.io/cfazilleau/spotify-autosaver:latest
    container_name: spotify-autosaver
    restart: unless-stopped

    volumes:
      # All configuration (client id, playlist settings, accounts + tokens)
      # lives here. Edit on the host, then: docker compose restart
      - ./settings.json:/app/settings.json:ro

    command: ["run"]

    # Keep logs from growing unbounded (the poll loop logs regularly).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
